<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Ad – TaskNova</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #05051a;
    color: #e2e2f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  body::before {
    content:'';
    position:fixed;inset:0;
    background: radial-gradient(ellipse 60% 50% at 30% 40%, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events:none;
  }
  .card {
    background: #0e0e2c;
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 28px;
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    position: relative;
    z-index:1;
  }
  .logo {
    font-size: 20px;
    font-weight: 800;
    color: #6c63ff;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }

  /* Timer Ring */
  .timer-wrap { position:relative; width:130px; height:130px; margin:0 auto 20px; }
  .timer-svg { width:130px; height:130px; transform:rotate(-90deg); }
  .timer-bg { fill:none; stroke:rgba(108,99,255,0.12); stroke-width:8; }
  .timer-bar { fill:none; stroke:url(#grad); stroke-width:8; stroke-linecap:round;
    stroke-dasharray:345; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear; }
  .timer-num { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center; }
  .timer-sec { font-size:44px;font-weight:900;line-height:1;color:#fff; }
  .timer-label { font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;letter-spacing:1px; }

  .status-text { font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:16px;min-height:20px; }

  /* Progress */
  .progress-wrap { background:rgba(255,255,255,0.06);border-radius:99px;height:6px;margin-bottom:20px;overflow:hidden; }
  .progress-fill { height:100%;border-radius:99px;background:linear-gradient(90deg,#6c63ff,#3b82f6);transition:transform 1s linear; }

  /* Info box */
  .ad-info {
    background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.18);
    border-radius:16px;padding:14px 16px;margin-bottom:20px;
    display:flex;align-items:center;gap:12px;text-align:left;
  }
  .ad-info h4 { font-size:14px;font-weight:700;color:#fff;margin-bottom:3px; }
  .ad-info p  { font-size:12px;color:rgba(255,255,255,0.4);line-height:1.4; }

  /* Buttons */
  .btn {
    width:100%;padding:16px;border:none;border-radius:16px;
    color:#fff;font-size:18px;font-weight:800;cursor:pointer;
    font-family:inherit;margin-bottom:10px;transition:transform 0.15s;
  }
  .btn:active { transform:scale(0.97); }
  .btn-watch  { background:linear-gradient(135deg,#6c63ff,#3b82f6);box-shadow:0 6px 24px rgba(108,99,255,0.35); }
  .btn-back   { background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);font-size:15px;color:rgba(255,255,255,0.7); }
  .btn-claim  { background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 6px 24px rgba(34,197,94,0.35);
    animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 6px 24px rgba(34,197,94,0.35)} 50%{box-shadow:0 6px 36px rgba(34,197,94,0.6)} }

  .hidden { display:none !important; }

  /* Dots */
  .dots { display:flex;align-items:center;justify-content:center;gap:5px;font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:12px; }
  .dot { width:6px;height:6px;border-radius:50%;background:#6c63ff;animation:blink 1.2s infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}

  .warn { background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:14px;
    padding:12px;font-size:13px;color:#ef4444;margin-bottom:12px; }
</style>
</head>
<body>
<div class="card" id="card">

  <div class="logo">⚡ TASKNOVA</div>

  <!-- Timer (pehle hidden) -->
  <div class="timer-wrap hidden" id="timerWrap">
    <svg class="timer-svg" viewBox="0 0 130 130">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6c63ff"/>
          <stop offset="100%" stop-color="#3b82f6"/>
        </linearGradient>
      </defs>
      <circle class="timer-bg" cx="65" cy="65" r="55"/>
      <circle class="timer-bar" id="timerBar" cx="65" cy="65" r="55"/>
    </svg>
    <div class="timer-num">
      <span class="timer-sec" id="timerSec">20</span>
      <span class="timer-label">SECONDS</span>
    </div>
  </div>

  <p class="status-text" id="statusText">Ad dekho aur 10 coins kamao!</p>

  <!-- Progress (pehle hidden) -->
  <div class="progress-wrap hidden" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Ad Info -->
  <div class="ad-info">
    <div style="font-size:28px">📺</div>
    <div>
      <h4>Video Watch Task</h4>
      <p>Ad dekho, wapas aao → <strong style="color:#f59e0b;">+10 Coins</strong></p>
    </div>
  </div>

  <!-- Tutorial Toggle Button -->
  <button class="btn" id="tutorialToggle" onclick="toggleTutorial()"
    style="background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.3);color:#ff4444;font-size:14px;font-weight:600;padding:12px;margin-bottom:10px;">
    ▶️ Tutorial — Wapas Kaise Aayein?
  </button>

  <!-- Tutorial Video (pehle hidden) -->
  <div id="tutorialBox" class="hidden" style="margin-bottom:12px;border-radius:16px;overflow:hidden;border:1px solid rgba(255,0,0,0.2);">
    <iframe
      src="https://www.youtube.com/embed/8iuEBvn8Gi4"
      style="width:100%;height:480px;border:none;display:block;"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Warning (hidden) -->
  <div class="warn hidden" id="warnBox">⚠️ Ad nahi dekhi! Pehle ad tab pe jao.</div>

  <!-- Dots (hidden) -->
  <div class="dots hidden" id="dotsWrap">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>Timer chal raha hai...</span>
  </div>

  <!-- STEP 1: Watch button -->
  <button class="btn btn-watch" id="watchBtn" onclick="startWatch()">📺 Watch Ad &amp; Earn</button>

  <!-- STEP 2: Wapas Aao button (ad ke baad) -->
  <button class="btn btn-back hidden" id="backBtn" onclick="userReturned()">✅ Ad Dekh Li – Wapas Aao</button>

  <!-- STEP 3: Claim button -->
  <button class="btn btn-claim hidden" id="claimBtn" onclick="claimCoins()">🎉 Claim 10 Coins</button>

</div>

<script>
  const AD_URL     = 'https://omg10.com/4/11063028';
  const RETURN_URL = 'https://tasknovaofficial.vercel.app/tasknova_tasks.html?status=success&task=video1';
  const TOTAL_SECS = 20;
  const CIRCUMF    = 2 * Math.PI * 55;

  let secsLeft     = TOTAL_SECS;
  let adOpened     = false;
  let adViewed     = false;
  let timerDone    = false;
  let interval     = null;

  const timerBar    = document.getElementById('timerBar');
  const timerSec    = document.getElementById('timerSec');
  const progressFill= document.getElementById('progressFill');
  const statusText  = document.getElementById('statusText');

  timerBar.style.strokeDasharray  = CIRCUMF;
  timerBar.style.strokeDashoffset = 0;

  // ── Tutorial toggle ───────────────────────────────────────────
  function toggleTutorial() {
    const box = document.getElementById('tutorialBox');
    const btn = document.getElementById('tutorialToggle');
    if (box.classList.contains('hidden')) {
      box.classList.remove('hidden');
      btn.textContent = '✖️ Tutorial Band Karo';
    } else {
      box.classList.add('hidden');
      btn.textContent = '▶️ Tutorial — Wapas Kaise Aayein?';
    }
  }

  // ── STEP 1: Watch button dabaya ──────────────────────────────
  function startWatch() {
    document.getElementById('watchBtn').classList.add('hidden');
    document.getElementById('timerWrap').classList.remove('hidden');
    document.getElementById('progressWrap').classList.remove('hidden');
    document.getElementById('dotsWrap').classList.remove('hidden');
    document.getElementById('backBtn').classList.remove('hidden');

    statusText.textContent = '📺 Ad new tab mein khuli! Dekho...';

    // Ad open karo
    if (!adOpened) {
      adOpened = true;
      try { window.open(AD_URL, '_blank'); } catch(e) {}
    }

    // Timer shuru
    startTimer();
  }

  // ── STEP 2: User "Wapas Aao" dabaya ──────────────────────────
  function userReturned() {
    const secsWatched = TOTAL_SECS - secsLeft;

    // Minimum 15 second ad dekhna zaroori
    if (secsWatched < 15) {
      const remaining = 15 - secsWatched;
      document.getElementById('warnBox').classList.remove('hidden');
      document.getElementById('warnBox').textContent = '⏳ Ad aur ' + remaining + ' second dekho, tab wapas aao!';
      return;
    }

    adViewed = true;
    document.getElementById('backBtn').classList.add('hidden');
    document.getElementById('warnBox').classList.add('hidden');

    if (timerDone) {
      showClaim();
    } else {
      statusText.textContent = '✅ Ad dekh li! Timer khatam hone do...';
      statusText.style.color = '#22c55e';
    }
  }

  // ── Timer ────────────────────────────────────────────────────
  function startTimer() {
    if (interval) return;
    interval = setInterval(() => {
      secsLeft--;
      timerBar.style.strokeDashoffset = CIRCUMF * (secsLeft / TOTAL_SECS);
      timerSec.textContent = secsLeft;
      progressFill.style.transform = `scaleX(${secsLeft / TOTAL_SECS})`;

      if (secsLeft <= 5) {
        timerBar.style.stroke = '#f59e0b';
        timerSec.style.color  = '#f59e0b';
      }

      if (secsLeft <= 0) {
        clearInterval(interval);
        timerDone = true;
        timerSec.textContent = '0';
        progressFill.style.transform = 'scaleX(0)';
        document.getElementById('dotsWrap').classList.add('hidden');

        if (adViewed) {
          showClaim();
        } else {
          // User ne abhi tak "Wapas Aao" nahi dabaya
          document.getElementById('warnBox').classList.remove('hidden');
          statusText.textContent = '⚠️ Pehle ad dekho, fir wapas aao!';
          statusText.style.color = '#ef4444';
        }
      }
    }, 1000);
  }

  // ── Claim dikhao ─────────────────────────────────────────────
  function showClaim() {
    document.getElementById('backBtn').classList.add('hidden');
    document.getElementById('dotsWrap').classList.add('hidden');
    document.getElementById('claimBtn').classList.remove('hidden');
    statusText.textContent  = '🎉 Timer khatam! Claim karo!';
    statusText.style.color  = '#22c55e';
    statusText.style.fontWeight = '700';
  }

  // ── Claim button ─────────────────────────────────────────────
  function claimCoins() {
    const btn = document.getElementById('claimBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Crediting...';
    btn.style.background = 'linear-gradient(135deg,#6c63ff,#3b82f6)';

    localStorage.setItem('pendingAdReward', JSON.stringify({
      coins: 10,
      type:  'watchAd',
      ts:    Date.now()
    }));

    setTimeout(() => {
      window.location.href = RETURN_URL;
    }, 400);
  }
</script>
</body>
</html>
