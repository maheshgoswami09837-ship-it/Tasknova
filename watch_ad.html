<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch Ad – TaskNova</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; font-family:'Nunito',sans-serif; background:#07071f; color:#fff; }

  /* BG glow */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(108,99,255,0.18) 0%, transparent 70%);
  }

  .screen {
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:24px 20px; position:relative; z-index:1;
    gap:0;
  }

  /* ── Logo ── */
  .logo {
    font-size:13px; font-weight:900; letter-spacing:3px;
    color:rgba(255,255,255,0.25); text-transform:uppercase;
    margin-bottom:28px;
  }

  /* ── Big Timer Circle ── */
  .timer-circle {
    position:relative; width:180px; height:180px;
    margin-bottom:28px; display:none;
  }
  .timer-circle.show { display:block; animation:pop 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes pop { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }

  .timer-svg { width:180px; height:180px; transform:rotate(-90deg); }
  .t-bg   { fill:none; stroke:rgba(108,99,255,0.12); stroke-width:10; }
  .t-fill { fill:none; stroke-width:10; stroke-linecap:round;
            stroke-dasharray:502; stroke-dashoffset:0;
            stroke:url(#g); transition:stroke-dashoffset 1s linear; }
  .t-inner {
    position:absolute; inset:0; display:flex;
    flex-direction:column; align-items:center; justify-content:center;
  }
  .t-num  { font-size:58px; font-weight:900; line-height:1; }
  .t-lbl  { font-size:11px; color:rgba(255,255,255,0.35); letter-spacing:2px; margin-top:2px; }

  /* ── Reward badge ── */
  .reward {
    display:flex; align-items:center; gap:8px;
    background:rgba(249,200,70,0.1); border:1.5px solid rgba(249,200,70,0.3);
    border-radius:50px; padding:10px 22px;
    font-size:20px; font-weight:900; color:#f9c846;
    margin-bottom:28px;
  }

  /* ── Status ── */
  .status {
    font-size:15px; font-weight:700; color:rgba(255,255,255,0.4);
    text-align:center; margin-bottom:28px; min-height:22px;
    transition:color 0.3s;
  }
  .status.green { color:#22d67a; }
  .status.red   { color:#ff5e5e; }

  /* ── Main CTA Button ── */
  .cta {
    width:100%; max-width:320px;
    padding:20px; border:none; border-radius:20px;
    font-family:'Nunito',sans-serif; font-size:18px; font-weight:900;
    cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
    letter-spacing:0.3px;
  }
  .cta:active { transform:scale(0.96); }

  .cta-watch {
    background:linear-gradient(135deg, #6c63ff 0%, #3b82f6 100%);
    color:#fff;
    box-shadow:0 12px 40px rgba(108,99,255,0.45), 0 0 0 1px rgba(108,99,255,0.2);
  }
  .cta-back {
    background:rgba(108,99,255,0.12);
    border:2px solid rgba(108,99,255,0.35) !important;
    color:#a89fff;
    box-shadow:none;
    display:none;
  }
  .cta-back.show { display:block; }
  .cta-claim {
    background:linear-gradient(135deg, #1db954, #22d67a);
    color:#fff;
    box-shadow:0 12px 40px rgba(34,214,122,0.45);
    animation:glow 1.8s ease-in-out infinite;
    display:none;
  }
  .cta-claim.show { display:block; }
  @keyframes glow {
    0%,100%{box-shadow:0 12px 40px rgba(34,214,122,0.4)}
    50%{box-shadow:0 12px 60px rgba(34,214,122,0.7)}
  }

  /* ── Progress thin bar ── */
  .bar-wrap { width:100%; max-width:320px; height:4px; background:rgba(255,255,255,0.06); border-radius:99px; margin-bottom:28px; overflow:hidden; display:none; }
  .bar-wrap.show { display:block; }
  .bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#6c63ff,#3b82f6); transform-origin:left; transform:scaleX(1); transition:transform 1s linear; }

  /* ── Warn ── */
  .warn { width:100%; max-width:320px; background:rgba(255,94,94,0.08); border:1px solid rgba(255,94,94,0.2); border-radius:14px; padding:12px 16px; font-size:13px; color:#ff7a7a; text-align:center; margin-bottom:16px; display:none; animation:shake 0.3s ease; }
  .warn.show { display:block; }
  @keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}

  /* gap between buttons */
  .gap { height:12px; }
</style>
</head>
<body>
<div class="screen">

  <div class="logo">⚡ TaskNova</div>

  <!-- Timer ring -->
  <div class="timer-circle" id="timerCircle">
    <svg class="timer-svg" viewBox="0 0 180 180">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6c63ff"/>
          <stop offset="100%" stop-color="#3b82f6"/>
        </linearGradient>
      </defs>
      <circle class="t-bg" cx="90" cy="90" r="80"/>
      <circle class="t-fill" id="tFill" cx="90" cy="90" r="80"/>
    </svg>
    <div class="t-inner">
      <span class="t-num" id="tNum">30</span>
      <span class="t-lbl">SECONDS</span>
    </div>
  </div>

  <!-- Reward -->
  <div class="reward">🪙 +10 Coins</div>

  <!-- Status -->
  <p class="status" id="status">Ad dekho aur coins kamao!</p>

  <!-- Progress bar -->
  <div class="bar-wrap" id="barWrap">
    <div class="bar-fill" id="barFill"></div>
  </div>

  <!-- Warning -->
  <div class="warn" id="warn"></div>

  <!-- Buttons -->
  <button class="cta cta-watch" id="watchBtn" onclick="startWatch()">📺 Watch Ad &amp; Earn</button>
  <div class="gap"></div>
  <button class="cta cta-back" id="backBtn" onclick="userReturned()">✅ Ad Band Ki — Claim Karo</button>
  <button class="cta cta-claim" id="claimBtn" onclick="claimCoins()">🎉 Claim 10 Coins</button>

</div>
<script>
  const AD_URL     = 'https://omg10.com/4/11063028';
  const RETURN_URL = 'https://tasknovaofficial.vercel.app/tasknova_tasks.html?status=success&task=video1';
  const TOTAL      = 30;   // 30-second requirement
  const MIN_WATCH  = 30;   // user must keep window open full 30s
  const CIRC       = 2 * Math.PI * 80;

  // ── State ────────────────────────────────────────────────────────
  let secsLeft     = TOTAL;
  let secsWatched  = 0;      // how many seconds ad window was OPEN
  let adWindow     = null;   // reference to popup window
  let mainIv       = null;   // countdown interval
  let pollIv       = null;   // adWindow.closed polling interval
  let timerDone    = false;
  let penaltyActive= false;  // true while penalty countdown is running

  const tFill   = document.getElementById('tFill');
  const tNum    = document.getElementById('tNum');
  const barFill = document.getElementById('barFill');
  const statusEl= document.getElementById('status');

  tFill.style.strokeDasharray  = CIRC;
  tFill.style.strokeDashoffset = 0;

  // ── Helpers ──────────────────────────────────────────────────────
  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + (cls || '');
  }
  function showWarn(msg) {
    const w = document.getElementById('warn');
    w.textContent = msg;
    w.className = 'warn show';
  }
  function hideWarn() { document.getElementById('warn').className = 'warn'; }

  function stopMainTimer() {
    if (mainIv) { clearInterval(mainIv); mainIv = null; }
  }
  function stopPollTimer() {
    if (pollIv) { clearInterval(pollIv); pollIv = null; }
  }

  // ── Reset everything and allow user to try again ─────────────────
  function resetToStart(warnMsg) {
    stopMainTimer();
    stopPollTimer();

    secsLeft     = TOTAL;
    secsWatched  = 0;
    adWindow     = null;
    timerDone    = false;
    penaltyActive= false;

    // Reset ring + bar
    tFill.style.strokeDashoffset = 0;
    tFill.style.stroke = 'url(#g)';
    tNum.textContent = TOTAL;
    tNum.style.color = '#fff';
    barFill.style.transform = 'scaleX(1)';

    // Reset UI
    document.getElementById('timerCircle').classList.remove('show');
    document.getElementById('barWrap').classList.remove('show');
    document.getElementById('backBtn').classList.remove('show');
    document.getElementById('claimBtn').classList.remove('show');
    document.getElementById('watchBtn').style.display = 'block';

    setStatus('Ad dekho aur coins kamao!', '');
    if (warnMsg) showWarn(warnMsg);
    else hideWarn();
  }

  // ── Open ad popup and start tracking ─────────────────────────────
  function startWatch() {
    if (penaltyActive) return;

    // Open ad in popup window (tracks .closed reliably)
    try {
      adWindow = window.open(AD_URL, 'adWindow',
        'width=' + screen.width + ',height=' + screen.height +
        ',scrollbars=yes,toolbar=no,menubar=no,location=no,status=no');
    } catch(e) { adWindow = null; }

    if (!adWindow || adWindow.closed) {
      // Popup blocked — fallback: open in new tab but warn user
      try { window.open(AD_URL, '_blank'); } catch(e) {}
      showWarn('⚠️ Popup blocked! Browser settings se allow karo ya tab band mat karna.');
    }

    // Show UI
    document.getElementById('watchBtn').style.display = 'none';
    document.getElementById('timerCircle').classList.add('show');
    document.getElementById('barWrap').classList.add('show');
    setStatus('👀 Ad dekh rahe ho... window band mat karna!', '');
    hideWarn();

    startMainTimer();
    startWindowPoll();
  }

  // ── Main 30s countdown (runs while ad window is OPEN) ───────────
  function startMainTimer() {
    if (mainIv) return;
    mainIv = setInterval(() => {
      // If window was closed early — poll handler will deal with it
      if (!adWindow || adWindow.closed) return;

      secsLeft--;
      secsWatched++;

      const pct = secsLeft / TOTAL;
      tFill.style.strokeDashoffset = CIRC * (1 - pct);
      tNum.textContent = Math.max(0, secsLeft);
      barFill.style.transform = 'scaleX(' + pct + ')';

      if (secsLeft <= 5) {
        tFill.style.stroke = '#f9c846';
        tNum.style.color   = '#f9c846';
      }

      if (secsLeft <= 0) {
        clearInterval(mainIv); mainIv = null;
        timerDone = true;
        // Timer done AND window still open → SUCCESS
        stopPollTimer();
        showClaimAfterClose();
      }
    }, 1000);
  }

  // ── Poll adWindow.closed every 500ms ────────────────────────────
  function startWindowPoll() {
    if (pollIv) return;
    pollIv = setInterval(() => {
      if (!adWindow) { stopPollTimer(); return; }

      try {
        const closed = adWindow.closed;
        if (closed) {
          stopPollTimer();
          onAdWindowClosed();
        }
      } catch(e) {
        // Cross-origin access blocked → assume still open
      }
    }, 500);
  }

  // ── Called the instant the ad window closes ──────────────────────
  function onAdWindowClosed() {
    stopMainTimer();

    if (timerDone) {
      // Full 30s completed before closing — legit
      showClaim();
      return;
    }

    // Closed before 30s — CHEAT DETECTED → reset with alert
    const watched = TOTAL - secsLeft;
    const needed  = TOTAL - watched;

    alert(
      '⚠️ Ad window band kar diya!\n\n' +
      'Tumne sirf ' + watched + 's dekhi — poori ' + TOTAL + 's dekhni hogi.\n' +
      'Coins nahi milenge agar window band karo.\n\n' +
      'Dobara try karo aur window khuli rakho!'
    );

    resetToStart('❌ Ad skip! Timer reset ho gaya. Dobara try karo.');
  }

  // ── After timer done: wait for user to close ad window themselves ─
  function showClaimAfterClose() {
    // Ad is still open (timer finished while window open)
    // Show "Wapas Aao" button so user knows to close ad and return
    document.getElementById('backBtn').classList.add('show');
    setStatus('✅ 30s poori! Ab ad band karo aur claim karo.', 'green');

    // Resume polling — now we wait for window.close() to confirm ad closed
    // After user closes it, onAdWindowClosed won't penalise (timerDone = true)
    startWindowPoll();
  }

  // ── "Wapas Aao" button — only shown after 30s completed ─────────
  function userReturned() {
    if (!timerDone) {
      const watched = TOTAL - secsLeft;
      showWarn('⏳ Abhi sirf ' + watched + 's hui — ' + (TOTAL - watched) + 's aur ruko!');
      return;
    }
    stopPollTimer();
    if (adWindow && !adWindow.closed) {
      try { adWindow.close(); } catch(e) {}
    }
    showClaim();
  }

  function showClaim() {
    document.getElementById('backBtn').classList.remove('show');
    document.getElementById('claimBtn').classList.add('show');
    setStatus('🎉 Ab claim karo!', 'green');
    hideWarn();
  }

  function claimCoins() {
    if (!timerDone) {
      showWarn('⚠️ 30 seconds poori dekho pehle!');
      return;
    }
    const btn = document.getElementById('claimBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Crediting...';
    btn.style.background = 'linear-gradient(135deg,#6c63ff,#3b82f6)';
    btn.style.animation = 'none';
    localStorage.setItem('pendingAdReward', JSON.stringify({ coins: 10, type: 'watchAd', ts: Date.now() }));
    setTimeout(() => { window.location.href = RETURN_URL; }, 400);
  }
</script>
</body>
</html>
