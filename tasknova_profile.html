<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaskNova Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #05051a; min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
  @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
  .glow-circle { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; }
  .glow-1 { width: 300px; height: 300px; background: rgba(108,99,255,0.2); top: -100px; left: -100px; }
  .glow-2 { width: 250px; height: 250px; background: rgba(59,130,246,0.15); bottom: -80px; right: -80px; }
  .content { position: relative; z-index: 10; padding: 20px 16px; animation: fadeUp 0.5s ease; }

  .profile-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 24px; text-align: center; margin-bottom: 20px; position: relative; }
  .avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #6c63ff, #3b82f6); border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 8px 20px rgba(108,99,255,0.3); }
  .profile-card h2 { font-size: 20px; color: #fff; font-weight: 700; margin-bottom: 4px; }
  .profile-card p { font-size: 13px; color: rgba(255,255,255,0.4); }

  .stats-grid { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat-box { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 14px; text-align: center; }
  .stat-box .val { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 2px; }
  .stat-box .lbl { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600; }

  .menu-list { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 6px; margin-bottom: 25px; }
  .menu-item { display: flex; align-items: center; gap: 14px; padding: 14px; border-radius: 14px; cursor: pointer; transition: background 0.2s; }
  .menu-item:active { background: rgba(255,255,255,0.05); }
  .menu-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .menu-info { flex: 1; }
  .menu-info h4 { font-size: 14px; color: #fff; font-weight: 600; }
  .menu-info p { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }
  .menu-arrow { color: rgba(255,255,255,0.2); font-size: 18px; }

  .logout-btn { width: 100%; padding: 16px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 14px; color: #ef4444; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Segoe UI', sans-serif; transition: all 0.2s; }
  .logout-btn:active { background: rgba(239,68,68,0.18); transform: scale(0.98); }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,26,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; align-items: center; padding: 10px 0 20px; z-index: 100; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 16px; }
  .nav-item span { font-size: 20px; }
  .nav-item p { font-size: 10px; color: rgba(255,255,255,0.3); font-weight: 500; }
  .nav-item.active p { color: #6c63ff; }
  .nav-center { width: 52px; height: 52px; background: linear-gradient(135deg, #6c63ff, #3b82f6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-top: -20px; box-shadow: 0 4px 20px rgba(108,99,255,0.4); cursor: pointer; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow-circle glow-1"></div>
<div class="glow-circle glow-2"></div>

<div class="content">

  <div class="profile-card">
    <div class="avatar">👤</div>
    <h2 id="userName">Loading Name...</h2>
    <p id="userEmail">Loading email...</p>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="val user-balance">₹0.00</div>
      <div class="lbl">BALANCE</div>
    </div>
    <div class="stat-box">
      <div class="val user-coins">0</div>
      <div class="lbl">TOTAL COINS</div>
    </div>
  </div>

  <div class="menu-list">
    <div class="menu-item" onclick="window.location.href='tasknova_withdraw.html'">
      <div class="menu-icon" style="background:rgba(108,99,255,0.15);">💰</div>
      <div class="menu-info"><h4>Withdraw Earnings</h4><p>Redeem coins to UPI/Bank</p></div>
      <div class="menu-arrow">›</div>
    </div>
    <div class="menu-item">
      <div class="menu-icon" style="background:rgba(59,130,246,0.15);">📞</div>
      <div class="menu-info"><h4>Support Center</h4><p>Help & contact us</p></div>
      <div class="menu-arrow">›</div>
    </div>
    <div class="menu-item">
      <div class="menu-icon" style="background:rgba(234,179,8,0.15);">📄</div>
      <div class="menu-info"><h4>Privacy Policy</h4><p>Terms & conditions</p></div>
      <div class="menu-arrow">›</div>
    </div>
  </div>

  <button class="logout-btn" onclick="logoutUser()">🚪 Logout</button>

</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='tasknova_home_new.html'"><span>🏠</span><p>Home</p></div>
  <div class="nav-item" onclick="window.location.href='tasknova_tasks.html'"><span>📋</span><p>Tasks</p></div>
  <div class="nav-center" onclick="window.location.href='tasknova_withdraw.html'">💰</div>
  <div class="nav-item" onclick="window.location.href='tasknova_refer.html'"><span>👥</span><p>Refer</p></div>
  <div class="nav-item active" onclick="window.location.href='tasknova_profile.html'"><span>👤</span><p>Profile</p></div>
</div>

<script>
  // Stars Background
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    const size = Math.random() * 2 + 0.5;
    star.style.cssText = width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${Math.random()*3+2}s;;
    starsContainer.appendChild(star);
  }

  // Live Firebase connection with Capital Letter matching
  async function loadProfile() {
    const uid = localStorage.getItem("tasknova_uid");
    if (!uid || uid === "null") {
      window.location.href = 'tasknova_login-13.html';
      return;
    }

    try {
      const res = await fetch(https://tasknova-66d0f-default-rtdb.firebaseio.com/users/${uid}.json);
      const data = await res.json();
      if (data) {
        // Match with Capital Username, Email, Balance, Coins from Firebase
        document.getElementById('userName').textContent = data.Username || "TaskNova User";
        document.getElementById('userEmail').textContent = data.Email || "No Email";
        
        const bal = Number(data.Balance) || 0;
        document.querySelector('.user-balance').textContent = '₹' + bal.toFixed(2);
        document.querySelector('.user-coins').textContent = data.Coins || 0;
      }
    } catch(e) {
      console.log("Error loading database:", e);
    }
  }

  // Safe logout function
  function logoutUser() {
    localStorage.removeItem("tasknova_uid");
    localStorage.clear();
    window.location.href = 'tasknova_login-13.html';
  }

  window.onload = loadProfile;
</script>
</body>
</html>
