<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaskNova — Offerwall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #05051a;
    min-height: 100vh;
    color: #fff;
    display: flex;
    flex-direction: column;
  }

  /* Background glows */
  .glow-1 { position: fixed; width: 300px; height: 300px; background: rgba(108,99,255,0.18); border-radius: 50%; filter: blur(80px); top: -100px; left: -100px; pointer-events: none; z-index: 0; }
  .glow-2 { position: fixed; width: 250px; height: 250px; background: rgba(59,130,246,0.13); border-radius: 50%; filter: blur(80px); bottom: -80px; right: -80px; pointer-events: none; z-index: 0; }

  /* Header */
  .top-bar {
    position: relative; z-index: 10;
    padding: 16px 16px 12px;
    display: flex; align-items: center; gap: 14px;
    background: rgba(5,5,26,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .back-btn {
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.18);
    color: #fff; width: 42px; height: 42px;
    border-radius: 13px; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.18s, transform 0.12s;
    line-height: 1;
  }
  .back-btn:active { background: rgba(108,99,255,0.3); transform: scale(0.92); }

  .header-text h1 { font-size: 18px; font-weight: 800; }
  .header-text p  { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* iFrame fills remaining height */
  .offerwall-wrap {
    position: relative; z-index: 1;
    flex: 1; display: flex; flex-direction: column;
  }
  .offerwall-wrap iframe {
    flex: 1;
    width: 100%;
    min-height: calc(100vh - 74px);
    border: none;
    display: block;
  }

  /* Loading overlay */
  .loading-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #05051a; z-index: 5; pointer-events: none;
  }
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid rgba(108,99,255,0.2);
    border-top-color: #6c63ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { font-size: 13px; color: rgba(255,255,255,0.4); }
  .loading-overlay.hidden { display: none; }
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<!-- Header -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">‹</button>
  <div class="header-text">
    <h1>🎁 Offerwall</h1>
    <p>Complete tasks to earn coins instantly!</p>
  </div>
</div>

<!-- Offerwall -->
<div class="offerwall-wrap">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading offers…</p>
  </div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">🎯</div>
    <h2 style="font-size:20px;font-weight:800;margin-bottom:8px;">Offers Available!</h2>
    <p style="color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:24px;">App download karke coins kamao.<br>Neeche button dabao — Play Store khulega.</p>
    <button onclick="openOfferwall()" style="background:linear-gradient(135deg,#6c63ff,#3b82f6);border:none;border-radius:16px;padding:16px 32px;color:#fff;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 24px rgba(108,99,255,0.4);">
      🚀 Offers Dekho & Kamao
    </button>
    <p style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:16px;">Browser mein khulega — wapas aane ke liye back button dabao</p>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('uid') || localStorage.getItem('tasknova_uid') || '';

  // ── Repeat click prevention ───────────────────────────────────
  // Ek baar click karne ke baad 24 ghante tak same offerwall nahi
  const OFFERWALL_KEY = 'tn_offerwall_last_click';
  const COOLDOWN_24HR = 24 * 60 * 60 * 1000;

  function canOpenOfferwall() {
    const last = parseInt(localStorage.getItem(OFFERWALL_KEY) || '0');
    return (Date.now() - last) > COOLDOWN_24HR;
  }

  function openOfferwall() {
    if (!canOpenOfferwall()) {
      const last = parseInt(localStorage.getItem(OFFERWALL_KEY));
      const remaining = COOLDOWN_24HR - (Date.now() - last);
      const hrs  = Math.floor(remaining / 3600000);
      const mins = Math.floor((remaining % 3600000) / 60000);
      alert('⏳ ' + hrs + ' ghante ' + mins + ' minute baad dobara try karo!');
      return;
    }

    // Click record karo
    localStorage.setItem(OFFERWALL_KEY, Date.now().toString());

    const url = 'https://lnksforyou.com/wall/te2DA' + (uid ? '?uid=' + uid : '');
    window.location.href = url;
  }

  // Button UI update
  window.addEventListener('DOMContentLoaded', function() {
    const btn = document.querySelector('button[onclick="openOfferwall()"]');
    if (btn && !canOpenOfferwall()) {
      const last = parseInt(localStorage.getItem(OFFERWALL_KEY));
      const remaining = COOLDOWN_24HR - (Date.now() - last);
      const hrs  = Math.floor(remaining / 3600000);
      const mins = Math.floor((remaining % 3600000) / 60000);
      btn.textContent = '⏳ ' + hrs + 'h ' + mins + 'm baad aao';
      btn.style.background = 'rgba(255,255,255,0.1)';
      btn.style.cursor = 'not-allowed';
      btn.disabled = true;
    }
  });
</script>


</body>
</html>
