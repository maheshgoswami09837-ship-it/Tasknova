<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaskNova — Offerwall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #05051a;
    min-height: 100vh;
    color: #fff;
    display: flex;
    flex-direction: column;
  }

  /* Background glows */
  .glow-1 { position: fixed; width: 300px; height: 300px; background: rgba(108,99,255,0.18); border-radius: 50%; filter: blur(80px); top: -100px; left: -100px; pointer-events: none; z-index: 0; }
  .glow-2 { position: fixed; width: 250px; height: 250px; background: rgba(59,130,246,0.13); border-radius: 50%; filter: blur(80px); bottom: -80px; right: -80px; pointer-events: none; z-index: 0; }

  /* Header */
  .top-bar {
    position: relative; z-index: 10;
    padding: 16px 16px 12px;
    display: flex; align-items: center; gap: 14px;
    background: rgba(5,5,26,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .back-btn {
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.18);
    color: #fff; width: 42px; height: 42px;
    border-radius: 13px; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.18s, transform 0.12s;
    line-height: 1;
  }
  .back-btn:active { background: rgba(108,99,255,0.3); transform: scale(0.92); }

  .header-text h1 { font-size: 18px; font-weight: 800; }
  .header-text p  { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* iFrame fills remaining height */
  .offerwall-wrap {
    position: relative; z-index: 1;
    flex: 1; display: flex; flex-direction: column;
  }
  .offerwall-wrap iframe {
    flex: 1;
    width: 100%;
    min-height: calc(100vh - 74px);
    border: none;
    display: block;
  }

  /* Loading overlay */
  .loading-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #05051a; z-index: 5; pointer-events: none;
  }
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid rgba(108,99,255,0.2);
    border-top-color: #6c63ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { font-size: 13px; color: rgba(255,255,255,0.4); }
  .loading-overlay.hidden { display: none; }
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<!-- Header -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">‹</button>
  <div class="header-text">
    <h1>🎁 Offerwall</h1>
    <p>Complete tasks to earn coins instantly!</p>
  </div>
</div>

<!-- Offerwall -->
<div class="offerwall-wrap">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading offers…</p>
  </div>

  <iframe
    id="offerwallFrame"
    sandbox="allow-popups allow-same-origin allow-scripts allow-top-navigation allow-top-navigation-by-user-activation allow-popups-to-escape-sandbox allow-downloads"
    referrerpolicy="no-referrer-when-downgrade"
    src="https://lnksforyou.com/wall/te2DA"
    title="CPALead Offerwall">
  </iframe>
</div>

<script>
  const frame   = document.getElementById('offerwallFrame');
  const overlay = document.getElementById('loadingOverlay');

  frame.addEventListener('load', function () {
    overlay.classList.add('hidden');
  });

  // Fallback: hide loader after 8s
  setTimeout(function () {
    overlay.classList.add('hidden');
  }, 8000);

  // ── Intent / Play Store link handler ─────────────────────────
  // Jab iframe ke andar Play Store ya intent:// link click ho
  // toh top-level window mein open karo
  window.addEventListener('message', function(e) {
    if (!e.data) return;
    const url = e.data.url || e.data;
    if (typeof url === 'string' && (
      url.startsWith('intent://') ||
      url.startsWith('market://') ||
      url.includes('play.google.com/store')
    )) {
      window.location.href = url;
    }
  });

  // iframe navigation intercept — Play Store links top window mein kholo
  frame.addEventListener('load', function() {
    try {
      const iDoc = frame.contentDocument || frame.contentWindow.document;
      iDoc.addEventListener('click', function(e) {
        const a = e.target.closest('a');
        if (!a) return;
        const href = a.href || '';
        if (
          href.startsWith('intent://') ||
          href.startsWith('market://') ||
          href.includes('play.google.com')
        ) {
          e.preventDefault();
          window.location.href = href;
        }
      });
    } catch(err) {
      // Cross-origin — sandbox allow-top-navigation handle karega
    }
  });
</script>


</body>
</html>
