<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaskNova — Offerwall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #05051a; color: #fff; }
  body { display: flex; flex-direction: column; }

  /* Header */
  .top-bar {
    flex-shrink: 0;
    z-index: 10;
    padding: 14px 16px 10px;
    display: flex; align-items: center; gap: 14px;
    background: rgba(5,5,26,0.97);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .back-btn {
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.18);
    color: #fff; width: 40px; height: 40px;
    border-radius: 13px; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .back-btn:active { background: rgba(108,99,255,0.3); }
  .header-text h1 { font-size: 17px; font-weight: 800; }
  .header-text p  { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* iFrame — fills all remaining space */
  .offerwall-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .offerwall-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* Loading */
  .loading-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #05051a; z-index: 5;
    transition: opacity 0.4s;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(108,99,255,0.2);
    border-top-color: #6c63ff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { font-size: 13px; color: rgba(255,255,255,0.4); }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">‹</button>
  <div class="header-text">
    <h1>🎁 Offerwall</h1>
    <p>Complete tasks to earn coins instantly!</p>
  </div>
</div>

<!-- Offerwall iframe -->
<div class="offerwall-wrap">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Offers load ho rahe hain…</p>
  </div>
  <iframe
    id="offerwallFrame"
    sandbox="allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation allow-popups-to-escape-sandbox"
    referrerpolicy="no-referrer"
    src="https://lnksforyou.com/wall/te2DA"
    title="CPALead Offerwall"
    scrolling="yes">
  </iframe>
</div>

<script>
  const frame   = document.getElementById('offerwallFrame');
  const overlay = document.getElementById('loadingOverlay');

  // ── UID lo ───────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const uid    = params.get('uid') || localStorage.getItem('tasknova_uid') || '';

  // ── Session lock — 10 min cooldown ──────────────────────────
  // Repeat clicks / baar baar kholne se CPALead errors aate hain
  const SESSION_KEY   = 'tn_offerwall_opened';
  const COOLDOWN_MS   = 10 * 60 * 1000; // 10 min
  const now           = Date.now();
  const lastOpen      = parseInt(localStorage.getItem(SESSION_KEY) || '0');
  const elapsed       = now - lastOpen;
  const inCooldown    = lastOpen > 0 && elapsed < COOLDOWN_MS;

  function loadOfferwall() {
    const wallUrl = 'https://lnksforyou.com/wall/te2DA' +
                    (uid ? '?sub_id=' + encodeURIComponent(uid) : '');
    console.log('[Offerwall] uid:', uid, '| url:', wallUrl);
    frame.src = wallUrl;
    frame.addEventListener('load', function() { overlay.classList.add('hidden'); });
    setTimeout(function() { overlay.classList.add('hidden'); }, 8000);
  }

  if (inCooldown) {
    // Cooldown mein hai — warning dikhao phir 5 sec baad load karo
    const remMin = Math.ceil((COOLDOWN_MS - elapsed) / 60000);
    overlay.innerHTML =
      '<div style="text-align:center;padding:40px 20px;">' +
        '<div style="font-size:36px;margin-bottom:12px;">⚠️</div>' +
        '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:8px;">' +
          'Baar baar kholne se offers cancel hote hain' +
        '</div>' +
        '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:16px;">' +
          'Please ' + remMin + ' min baad try karo' +
        '</div>' +
        '<div style="font-size:11px;color:rgba(255,255,255,0.25);">5 seconds mein load ho raha hai...</div>' +
      '</div>';
    setTimeout(function() {
      loadOfferwall();
    }, 5000);
  } else {
    // Fresh open — timestamp save karo aur load karo
    localStorage.setItem(SESSION_KEY, now.toString());
    loadOfferwall();
  }

  // ── Visibility change — iframe reload mat karo ───────────────
  // Jab user back aaye tab sirf overlay hide karo
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') {
      setTimeout(function() { overlay.classList.add('hidden'); }, 300);
      // Frame src mat change karo — ye repeat click prevent karta hai
    }
  });
</script>
</body>
</html>
