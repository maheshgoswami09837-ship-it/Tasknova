<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TaskNova - OTP Server Test</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
  h2 { color: #2563eb; }
  .box { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
  button { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
  button:disabled { background: #999; }
  pre { background: #111; color: #0f0; padding: 12px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; font-size: 13px; }
  .status { font-weight: bold; margin-top: 8px; }
  .ok { color: green; }
  .fail { color: red; }
</style>
</head>
<body>

<h2>🔧 TaskNova OTP Server Test</h2>

<div class="box">
  <p style="color:#666; font-size:13px;">Ye file jis domain pe hosted hai, usi ke API routes ko call karegi (same-origin, koi URL dalne ki zaroorat nahi).</p>
  <label>Email</label>
  <input id="email" type="email" placeholder="test@gmail.com">

  <button onclick="sendOtp()" id="sendBtn">Send OTP</button>
  <div id="sendStatus" class="status"></div>
</div>

<div class="box">
  <label>OTP Code (jo email mein aaya)</label>
  <input id="otp" type="text" placeholder="123456">

  <button onclick="verifyOtp()" id="verifyBtn">Verify OTP</button>
  <div id="verifyStatus" class="status"></div>
</div>

<div class="box">
  <label>Raw Response Log</label>
  <pre id="log">Yahan response dikhega...</pre>
</div>

<script>
function log(msg) {
  document.getElementById('log').textContent = typeof msg === 'string' ? msg : JSON.stringify(msg, null, 2);
}

function getBase() {
  return ''; // same-origin: relative paths /api/... will hit whatever domain this file is hosted on
}

async function sendOtp() {
  const base = getBase();
  const email = document.getElementById('email').value.trim();
  const statusEl = document.getElementById('sendStatus');
  const btn = document.getElementById('sendBtn');

  if (!email) { statusEl.textContent = '⚠️ Email daalo'; statusEl.className = 'status fail'; return; }

  btn.disabled = true;
  statusEl.textContent = 'Sending...';
  statusEl.className = 'status';

  try {
    const res = await fetch(base + '/api/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch (e) { data = text; }

    log({ status: res.status, ok: res.ok, response: data });

    if (res.ok) {
      statusEl.textContent = '✅ Server ne OTP bhej diya (status ' + res.status + '). Ab Gmail check karo.';
      statusEl.className = 'status ok';
    } else {
      statusEl.textContent = '❌ Server error (status ' + res.status + '). Neeche log dekho.';
      statusEl.className = 'status fail';
    }
  } catch (err) {
    log('Network/Fetch Error: ' + err.message);
    statusEl.textContent = '❌ Request hi fail ho gaya (network/CORS/URL issue). Neeche log dekho.';
    statusEl.className = 'status fail';
  } finally {
    btn.disabled = false;
  }
}

async function verifyOtp() {
  const base = getBase();
  const email = document.getElementById('email').value.trim();
  const otp = document.getElementById('otp').value.trim();
  const statusEl = document.getElementById('verifyStatus');
  const btn = document.getElementById('verifyBtn');

  if (!email || !otp) { statusEl.textContent = '⚠️ Email aur OTP dono daalo'; statusEl.className = 'status fail'; return; }

  btn.disabled = true;
  statusEl.textContent = 'Verifying...';
  statusEl.className = 'status';

  try {
    const res = await fetch(base + '/api/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp })
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch (e) { data = text; }

    log({ status: res.status, ok: res.ok, response: data });

    if (res.ok) {
      statusEl.textContent = '✅ OTP Verified! Server sahi kaam kar raha hai.';
      statusEl.className = 'status ok';
    } else {
      statusEl.textContent = '❌ Verify fail (status ' + res.status + '). Neeche log dekho.';
      statusEl.className = 'status fail';
    }
  } catch (err) {
    log('Network/Fetch Error: ' + err.message);
    statusEl.textContent = '❌ Request hi fail ho gaya (network/CORS/URL issue).';
    statusEl.className = 'status fail';
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
