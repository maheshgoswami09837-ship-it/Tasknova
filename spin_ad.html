<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch Ad - TaskNova</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #030712;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 20px;
    color: #fff;
    overflow: hidden;
  }

  /* Background glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 320px; height: 320px; background: #2563eb; top: -80px; left: -60px; }
  .blob-2 { width: 260px; height: 260px; background: #1d4ed8; bottom: -60px; right: -40px; }
  .blob-3 { width: 180px; height: 180px; background: #60a5fa; top: 45%; left: 55%; opacity: 0.1; }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Card wrapper */
  .card {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(12px);
  }

  /* Coin badge */
  .coin-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(37,99,235,0.18);
    border: 1px solid rgba(96,165,250,0.3);
    border-radius: 50px;
    padding: 9px 22px;
    font-size: 16px;
    font-weight: 800;
    color: #93c5fd;
    letter-spacing: 0.3px;
  }

  /* Timer circle */
  .timer-circle-wrap {
    position: relative;
    width: 140px;
    height: 140px;
  }
  .timer-circle-wrap svg {
    position: absolute;
    top: 0; left: 0;
    transform: rotate(-90deg);
  }
  .circle-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 6; }
  .circle-prog  {
    fill: none;
    stroke: url(#blueGrad);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 376;
    stroke-dashoffset: 376;
    transition: stroke-dashoffset 1s linear;
  }
  .timer-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .timer-num {
    font-size: 46px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .timer-label {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Status */
  .status-row {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    min-height: 18px;
    text-align: center;
  }

  /* Buttons */
  .btn-start {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb, #3b82f6);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.4px;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    box-shadow: 0 4px 24px rgba(37,99,235,0.45);
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-start:active { opacity: 0.85; transform: scale(0.98); }

  .btn-claim {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #059669, #10b981);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    box-shadow: 0 4px 20px rgba(16,185,129,0.4);
    display: none;
    transition: opacity 0.2s;
  }
  .btn-claim:active { opacity: 0.85; }

  /* Ad hint chip */
  .hint-chip {
    display: none;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    border-radius: 10px;
    border: 1px dashed rgba(96,165,250,0.4);
    background: rgba(37,99,235,0.08);
    color: #60a5fa;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s;
    text-align: center;
    letter-spacing: 0.2px;
  }
  .hint-chip:active { background: rgba(37,99,235,0.18); }
  .hint-chip svg { flex-shrink: 0; opacity: 0.7; }

  /* Warning */
  .warning-row {
    font-size: 11.5px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    line-height: 1.5;
  }

  /* Spins info */
  .spins-row {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    text-align: center;
  }

  /* Back button */
  .btn-back {
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    background: transparent;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    letter-spacing: 0.3px;
    transition: background 0.2s, color 0.2s;
  }
  .btn-back:active { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }

  /* Cooldown / Penalty boxes */
  .info-box {
    width: 100%;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    display: none;
    margin-bottom: 8px;
  }
  .info-box.cooldown {
    background: rgba(37,99,235,0.1);
    border: 1px solid rgba(96,165,250,0.2);
  }
  .info-box.penalty {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
  }
  .info-box .box-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .info-box.cooldown .box-title { color: #93c5fd; }
  .info-box.penalty  .box-title { color: #fca5a5; }
  .info-box .box-time {
    font-size: 34px;
    font-weight: 800;
  }
  .info-box.cooldown .box-time { color: #60a5fa; }
  .info-box.penalty  .box-time { color: #ef4444; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="container">

  <!-- Cooldown box -->
  <div class="info-box cooldown" id="cooldownBox">
    <div class="box-title">⏳ Next ad ke liye wait karo</div>
    <div class="box-time" id="cooldownTime">1:00</div>
  </div>

  <!-- Penalty box -->
  <div class="info-box penalty" id="penaltyBox">
    <div class="box-title">❌ Ad skip ki — penalty chal rahi hai</div>
    <div class="box-time" id="penaltyTime">10:00</div>
  </div>

  <!-- Main card -->
  <div class="card">

    <!-- Coin badge -->
    <div class="coin-badge" id="prizeBadge">🪙 <span id="prizeAmount">10</span> Coins</div>

    <!-- Timer circle -->
    <div class="timer-circle-wrap" id="timerWrap">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <defs>
          <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#1d4ed8"/>
            <stop offset="100%" stop-color="#60a5fa"/>
          </linearGradient>
        </defs>
        <circle class="circle-track" cx="70" cy="70" r="60"/>
        <circle class="circle-prog"  cx="70" cy="70" r="60" id="circleProgress"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-num"  id="timerNum">0</div>
        <div class="timer-label">/ 25 sec</div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-row" id="statusText">Start dabao aur ad dekho</div>

    <!-- Start button -->
    <button class="btn-start" id="watchBtn" onclick="startAd()">▶ &nbsp;Start</button>

    <!-- Hint chip — shown after start -->
    <div class="hint-chip" id="adHintBtn" onclick="retriggerAd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Ad nahi chala — screen pe click karo
    </div>

    <!-- Claim button -->
    <button class="btn-claim" id="claimBtn" onclick="claimCoins()">✅ &nbsp;Claim Coins</button>

    <!-- Warning -->
    <div class="warning-row" id="warningText">⚠️ Ad skip karne par 10 min ki penalty lagegi</div>

    <!-- Spins info -->
    <div class="spins-row" id="spinsInfo"></div>

  </div>

  <!-- Back button outside card -->
  <button class="btn-back" onclick="goBack()">← Wapas Jao</button>

</div>

<script>
  // ── Config ────────────────────────────────────────────────────
  const DB_URL            = 'https://tasknova-66d0f-default-rtdb.firebaseio.com';
  const AD_DURATION       = 25;
  const MAX_SPINS_PER_DAY = 6;
  const PENALTY_DURATION  = 600;
  const COOLDOWN_DURATION = 60;
  const CIRCUMFERENCE     = 2 * Math.PI * 60; // 376.99

  const KEY_PENALTY_UNTIL  = 'tn_watch_penalty_until';
  const KEY_COOLDOWN_UNTIL = 'tn_watch_cooldown_until';
  const KEY_PRIZE          = 'tn_spin_prize';
  // ── Daily helpers — tasks file ke saath SYNC (same key use hoti hai) ──
  function getTodayKey() {
    // Raat 12 baje IST (midnight) = naya din — tasks file se bilkul match
    const istOffset = 5.5 * 60 * 60 * 1000;
    const now = new Date();
    const nowIST = new Date(now.getTime() + istOffset - (now.getTimezoneOffset() * 60 * 1000));
    return nowIST.toISOString().split('T')[0]; // YYYY-MM-DD in IST
  }
  function getDailyData() {
    try {
      const key = 'tasknova_daily_' + getTodayKey();
      const raw = localStorage.getItem(key);
      if (raw) return JSON.parse(raw);
      return { earned:0, checkin:false, spins:0, scratches:0, quizzes:0, lastSpin:0, lastScratch:0, lastQuiz:0 };
    } catch(e) {
      return { earned:0, checkin:false, spins:0, scratches:0, quizzes:0, lastSpin:0, lastScratch:0, lastQuiz:0 };
    }
  }
  function saveDailyData(d) {
    const key = 'tasknova_daily_' + getTodayKey();
    localStorage.setItem(key, JSON.stringify(d));
  }
  function getWatchCount() { return getDailyData().spins || 0; }
  function incrementWatchCount() {
    const d = getDailyData(); d.spins = (d.spins||0)+1; d.lastSpin = Date.now(); saveDailyData(d);
  }

  // ── State ─────────────────────────────────────────────────────
  let elapsed        = 0;
  let timerInterval  = null;
  let timerStarted   = false;
  let creditFired    = false;
  let penaltyApplied = false;
  let adOpened       = false;

  const uid   = localStorage.getItem('tasknova_uid');
  const prize = parseInt(localStorage.getItem(KEY_PRIZE) || '10');
  document.getElementById('prizeAmount').textContent = prize;

  // ── Timer UI update ───────────────────────────────────────────
  function updateTimer() {
    const pct    = elapsed / AD_DURATION;
    const offset = CIRCUMFERENCE * (1 - pct);
    document.getElementById('circleProgress').style.strokeDashoffset = offset;
    document.getElementById('timerNum').textContent = elapsed;
  }

  // ── Ad networks ───────────────────────────────────────────────
  function triggerMonetagPopunder() {
    const old = document.getElementById('monetag-popunder');
    if (old) old.remove();
    const s = document.createElement('script');
    s.id = 'monetag-popunder';
    s.src = 'https://al5sm.com/tag.min.js';
    s.dataset.zone = '11074231';
    document.body.appendChild(s);
  }
  function triggerAdsterraPopunder() {
    const old = document.getElementById('adsterra-popunder');
    if (old) old.remove();
    window.atOptions = { key:'f1f69a147759698e8fda4cfd27e423ba', format:'iframe', height:50, width:320, params:{} };
    const s = document.createElement('script');
    s.id   = 'adsterra-popunder';
    s.type = 'text/javascript';
    s.src  = '//www.effectivecpmnetwork.com/b1bggwx0/invoke.js';
    document.body.appendChild(s);
  }
  // Har spin pe dono ads chalenge — Monetag + Adsterra ek saath
  function triggerAd() {
    triggerMonetagPopunder();
    // Adsterra thodi der baad inject karo taaki dono alag window mein khulein
    setTimeout(function() { triggerAdsterraPopunder(); }, 800);
  }
  function retriggerAd() { triggerAd(); }

  // ── Start timer ───────────────────────────────────────────────
  function startTimer() {
    if (timerStarted || creditFired || penaltyApplied) return;
    timerStarted = true;
    elapsed = 0;
    updateTimer();
    document.getElementById('statusText').textContent = '⏳ Ad dekh rahe ho...';
    history.pushState({ adActive:true }, '', location.href);

    timerInterval = setInterval(function() {
      if (penaltyApplied || creditFired) { clearInterval(timerInterval); return; }
      elapsed++;
      updateTimer();
      document.getElementById('statusText').textContent = '⏳ Ad chal raha hai... ' + elapsed + 's';
      if (elapsed >= AD_DURATION) {
        clearInterval(timerInterval);
        timerInterval = null;
        onTimerComplete();
      }
    }, 1000);
  }

  // ── startAd ───────────────────────────────────────────────────
  function startAd() {
    const penaltyUntil  = parseInt(localStorage.getItem(KEY_PENALTY_UNTIL)  || '0');
    const cooldownUntil = parseInt(localStorage.getItem(KEY_COOLDOWN_UNTIL) || '0');
    if (penaltyUntil  > Date.now()) { showPenaltyCountdown(penaltyUntil);  return; }
    if (cooldownUntil > Date.now()) { showCooldownCountdown(cooldownUntil); return; }
    if (getWatchCount() >= MAX_SPINS_PER_DAY) {
      document.getElementById('statusText').textContent = '🚫 Aaj ki limit khatam!';
      return;
    }

    document.getElementById('watchBtn').style.display = 'none';

    if (!adOpened) { adOpened = true; triggerAd(); }
    startTimer();

    setTimeout(function() {
      if (timerStarted && !creditFired && !penaltyApplied)
        document.getElementById('adHintBtn').style.display = 'flex';
    }, 2000);
  }

  // ── Timer complete ─────────────────────────────────────────────
  function onTimerComplete() {
    document.removeEventListener('visibilitychange', onVisChange);
    document.getElementById('adHintBtn').style.display  = 'none';
    document.getElementById('statusText').textContent   = '🎉 Timer khatam! Ab claim karo.';
    document.getElementById('warningText').textContent  = '';
    document.getElementById('claimBtn').style.display   = 'block';
    document.getElementById('timerWrap').style.opacity  = '0.45';
  }

  // ── Claim ─────────────────────────────────────────────────────
  function claimCoins() {
    if (creditFired || penaltyApplied) return;
    if (elapsed < AD_DURATION) { alert('Abhi ' + (AD_DURATION-elapsed) + 's baaki hain!'); return; }
    creditFired = true;

    const btn = document.getElementById('claimBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Crediting...';
    document.getElementById('statusText').textContent = '✅ Coins aa rahe hain...';

    incrementWatchCount();
    const cooldownUntil = Date.now() + COOLDOWN_DURATION * 1000;
    localStorage.setItem(KEY_COOLDOWN_UNTIL, cooldownUntil.toString());

    if (uid && uid !== 'null') {
      fetch(DB_URL + '/users/' + uid + '.json')
        .then(r => r.json())
        .then(data => {
          if (!data) return;
          const newCoins   = (data.coins   || 0) + prize;
          const newBalance = parseFloat((newCoins/100).toFixed(2));
          return fetch(DB_URL + '/users/' + uid + '.json', {
            method: 'PATCH',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ coins:newCoins, balance:newBalance, tasksDone:(data.tasksDone||0)+1 })
          });
        })
        .then(() => {
          document.getElementById('statusText').textContent = '🎉 +' + prize + ' Coins credited!';
          btn.textContent = '✅ +' + prize + ' Coins Claimed!';
          const done = getWatchCount();
          const nxt  = done + 1;
          document.getElementById('spinsInfo').textContent = 'Aaj ke spins: ' + done + '/' + MAX_SPINS_PER_DAY +
            (done < MAX_SPINS_PER_DAY ? ' · Monetag + Adsterra' : ' · Limit khatam!');

          fetch(DB_URL + '/users/' + uid + '/taskHistory.json', {
            method: 'POST',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ userId:uid, taskType:'Ad', taskName:'📺 Watch Video Ad', coins:prize, status:'Success', timestamp:Date.now() })
          }).catch(e => console.warn(e));

          setTimeout(() => showCooldownAndRedirect(cooldownUntil), 1500);
        })
        .catch(() => {
          document.getElementById('statusText').textContent = '❌ Error! Dobara try karo.';
          btn.disabled = false; btn.textContent = '✅ Claim Coins'; creditFired = false;
        });
    } else {
      document.getElementById('statusText').textContent = '❌ Pehle login karo!';
    }
  }

  // ── Penalty ───────────────────────────────────────────────────
  function applyPenalty() {
    if (penaltyApplied || creditFired) return;
    penaltyApplied = true;
    clearInterval(timerInterval);
    document.removeEventListener('visibilitychange', onVisChange);
    const penaltyUntil = Date.now() + PENALTY_DURATION * 1000;
    localStorage.setItem(KEY_PENALTY_UNTIL, penaltyUntil.toString());
    document.getElementById('watchBtn').style.display   = 'none';
    document.getElementById('claimBtn').style.display   = 'none';
    document.getElementById('adHintBtn').style.display  = 'none';
    document.getElementById('timerWrap').style.display  = 'none';
    document.getElementById('warningText').textContent  = '';
    document.getElementById('statusText').textContent   = '❌ Ad skip ki!';
    showPenaltyCountdown(penaltyUntil);
  }

  // ── Countdown helpers ─────────────────────────────────────────
  function startCountdown(until, timeEl, onDone) {
    const iv = setInterval(() => {
      const rem = Math.max(0, Math.ceil((until - Date.now()) / 1000));
      const m = Math.floor(rem/60), s = rem%60;
      timeEl.textContent = m + ':' + String(s).padStart(2,'0');
      if (rem <= 0) { clearInterval(iv); onDone(); }
    }, 1000);
  }

  function hideMain() {
    document.getElementById('watchBtn').style.display  = 'none';
    document.getElementById('timerWrap').style.display = 'none';
    document.getElementById('prizeBadge').style.display= 'none';
    document.getElementById('claimBtn').style.display  = 'none';
    document.getElementById('adHintBtn').style.display = 'none';
    document.getElementById('warningText').textContent = '';
    document.getElementById('statusText').textContent  = '';
  }

  function showPenaltyCountdown(until) {
    hideMain();
    document.getElementById('penaltyBox').style.display = 'block';
    startCountdown(until, document.getElementById('penaltyTime'), () => {
      localStorage.removeItem(KEY_PENALTY_UNTIL); location.reload();
    });
  }

  function showCooldownCountdown(until) {
    hideMain();
    document.getElementById('cooldownBox').style.display = 'block';
    startCountdown(until, document.getElementById('cooldownTime'), () => {
      localStorage.removeItem(KEY_COOLDOWN_UNTIL); location.reload();
    });
  }

  function showCooldownAndRedirect(until) {
    document.getElementById('claimBtn').style.display  = 'none';
    document.getElementById('timerWrap').style.display = 'none';
    document.getElementById('prizeBadge').style.display= 'none';
    document.getElementById('cooldownBox').style.display = 'block';
    startCountdown(until, document.getElementById('cooldownTime'), () => {
      localStorage.removeItem(KEY_COOLDOWN_UNTIL); goBack();
    });
  }

  // ── Visibility change — sirf timer chal raha ho tab ad trigger karo ──
  function onVisChange() {
    if (document.visibilityState === 'visible'
        && timerStarted
        && !creditFired
        && !penaltyApplied
        && elapsed < AD_DURATION) {   // timer abhi khatam nahi hua
      document.getElementById('statusText').textContent = '⏳ Ad chal raha hai... ' + elapsed + 's';
      triggerAd();
    }
  }
  document.addEventListener('visibilitychange', onVisChange);

  // ── Back = penalty ────────────────────────────────────────────
  window.addEventListener('popstate', function() {
    if (timerStarted && !creditFired && elapsed < AD_DURATION) {
      history.pushState(null, '', location.href);
      applyPenalty();
    }
  });

  // ── Init ──────────────────────────────────────────────────────
  function goBack() { window.location.href = 'tasknova_tasks.html'; }

  (function init() {
    const count = getWatchCount();
    document.getElementById('spinsInfo').textContent = 'Aaj ke spins: ' + count + '/' + MAX_SPINS_PER_DAY;

    const penaltyUntil  = parseInt(localStorage.getItem(KEY_PENALTY_UNTIL)  || '0');
    const cooldownUntil = parseInt(localStorage.getItem(KEY_COOLDOWN_UNTIL) || '0');
    if (penaltyUntil  > Date.now()) { showPenaltyCountdown(penaltyUntil);  return; }
    if (cooldownUntil > Date.now()) { showCooldownCountdown(cooldownUntil); return; }

    if (count >= MAX_SPINS_PER_DAY) {
      const btn = document.getElementById('watchBtn');
      btn.textContent = '🚫 Aaj ki limit khatam!';
      btn.style.background = 'rgba(255,255,255,0.07)';
      btn.style.boxShadow  = 'none';
      btn.style.color      = 'rgba(255,255,255,0.3)';
      btn.onclick = null;
      document.getElementById('statusText').textContent  = 'Kal wapas aao!';
      document.getElementById('warningText').textContent = '';
    }

    updateTimer();
  })();
</script>
</body>
</html>
