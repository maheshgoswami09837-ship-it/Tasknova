<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Send Message</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0F1C; --surface:#111827; --surface-2:#161F32; --border:#232E48;
    --text:#E7ECF6; --text-dim:#8B96AF; --text-faint:#5B6785;
    --emerald:#12D992; --emerald-dim:#0B9C6B; --amber:#F5A623; --red:#F0466A; --blue:#4C8DFF;
    --radius:14px; --font-ui:'Inter',sans-serif;
    --shadow:0 8px 24px rgba(0,0,0,.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font-ui); background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }
  .wrap { max-width:480px; margin:0 auto; }
  .topbar { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .back-btn { width:38px; height:38px; border-radius:10px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-dim); flex-shrink:0; }
  .back-btn:hover { color:var(--text); border-color:var(--text-faint); }
  .back-btn svg { width:18px; height:18px; }
  h1 { font-size:19px; font-weight:800; display:flex; align-items:center; gap:9px; }
  h1 svg { width:20px; height:20px; color:var(--emerald); flex-shrink:0; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; }
  label { display:block; font-size:11.5px; font-weight:700; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; margin-top:16px; }
  label:first-child { margin-top:0; }
  input, textarea, select {
    width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:12px;
    font-size:14px; font-family:inherit; outline:none; background:var(--surface-2); color:var(--text);
  }
  input::placeholder, textarea::placeholder{ color:var(--text-faint); }
  textarea { resize:vertical; min-height:90px; }
  input:focus, textarea:focus, select:focus { border-color:var(--emerald); }
  .toggleRow { display:flex; gap:8px; margin-top:6px; }
  .toggleBtn { flex:1; padding:11px; border-radius:12px; border:1.5px solid var(--border); background:var(--surface-2); font-size:13px; font-weight:700; color:var(--text-dim); cursor:pointer; text-align:center; }
  .toggleBtn.active { border-color:var(--emerald); background:rgba(18,217,146,.12); color:var(--emerald); }
  #uidField { display:none; }
  .sendBtn {
    width:100%; margin-top:20px; padding:14px; border:none; border-radius:14px;
    background:var(--emerald); color:#04150F; font-size:14.5px; font-weight:800; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .sendBtn:hover{ background:var(--emerald-dim); }
  .sendBtn:disabled { opacity:0.6; cursor:not-allowed; }
  .sendBtn svg{ width:15px; height:15px; }
  .status { margin-top:12px; font-size:13px; font-weight:600; text-align:center; padding:10px; border-radius:10px; display:none; }
  .status.ok { display:flex; align-items:center; justify-content:center; gap:7px; background:rgba(18,217,146,.12); color:var(--emerald); }
  .status.err { display:flex; align-items:center; justify-content:center; gap:7px; background:rgba(240,70,106,.12); color:var(--red); }
  .status svg{ width:14px; height:14px; flex-shrink:0; }
  .hint { font-size:11px; color:var(--text-faint); margin-top:14px; text-align:center; }
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div class="back-btn" onclick="goBack()" title="Back to Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </div>
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
      Send Message
    </h1>
  </div>

  <div class="card">
    <label>Send To</label>
    <div class="toggleRow">
      <div class="toggleBtn active" id="btnAll" onclick="setMode('all')">All Users</div>
      <div class="toggleBtn" id="btnUser" onclick="setMode('user')">Specific User</div>
    </div>

    <div id="uidField">
      <label>User UID</label>
      <input type="text" id="targetUid" placeholder="Paste user's UID here">
    </div>

    <label>Title</label>
    <input type="text" id="msgTitle" placeholder="e.g. Naya Offer Aaya Hai!">

    <label>Message</label>
    <textarea id="msgBody" placeholder="Apna message likho..."></textarea>

    <button class="sendBtn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>
      Send Message
    </button>
    <div class="status" id="statusBox"></div>
  </div>

  <div class="hint">Messages are sent live via Firebase to the TaskNova app.</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBbDeBse2WXwzd_X0Mr8VyEzytI8Yya_uc",
    authDomain: "tasknova-66d0f.firebaseapp.com",
    databaseURL: "https://tasknova-66d0f-default-rtdb.firebaseio.com",
    projectId: "tasknova-66d0f",
    storageBucket: "tasknova-66d0f.firebasestorage.app",
    messagingSenderId: "135129024485",
    appId: "1:135129024485:web:232a90fd0752086568510c"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.goBack = function() {
    // Prefer returning into browser history (keeps the dashboard's own state),
    // falling back to a direct link if there's no history to go back to.
    if (document.referrer && document.referrer.includes(location.hostname)) {
      history.back();
    } else {
      window.location.href = 'tasknova_admin_dashboard.html';
    }
  };

  let mode = 'all';
  window.setMode = function(m) {
    mode = m;
    document.getElementById('btnAll').classList.toggle('active', m === 'all');
    document.getElementById('btnUser').classList.toggle('active', m === 'user');
    document.getElementById('uidField').style.display = m === 'user' ? 'block' : 'none';
  };

  window.sendMessage = async function() {
    const title = document.getElementById('msgTitle').value.trim();
    const body = document.getElementById('msgBody').value.trim();
    const uid = document.getElementById('targetUid').value.trim();
    const sendBtn = document.getElementById('sendBtn');

    if (!title || !body) {
      showStatus('Title aur message dono bharo', false);
      return;
    }
    if (mode === 'user' && !uid) {
      showStatus('User UID daalo', false);
      return;
    }

    sendBtn.disabled = true;
    const originalHtml = sendBtn.innerHTML;
    sendBtn.textContent = 'Sending...';

    try {
      const payload = { title, body, timestamp: Date.now() };

      if (mode === 'all') {
        const newRef = push(ref(db, 'broadcastMessages'));
        await set(newRef, payload);
      } else {
        const newRef = push(ref(db, 'messages/' + uid));
        await set(newRef, { ...payload, read: false });
      }

      showStatus('Message bhej diya!', true);
      document.getElementById('msgTitle').value = '';
      document.getElementById('msgBody').value = '';
      document.getElementById('targetUid').value = '';
    } catch (e) {
      console.error(e);
      showStatus('Error: ' + e.message, false);
    } finally {
      sendBtn.disabled = false;
      sendBtn.innerHTML = originalHtml;
    }
  };

  function showStatus(msg, ok) {
    const box = document.getElementById('statusBox');
    const icon = ok
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 21.5 20h-19z"/><path d="M12 9v5"/><circle cx="12" cy="17" r="0.8" fill="currentColor" stroke="none"/></svg>';
    box.innerHTML = icon + '<span>' + msg + '</span>';
    box.className = 'status ' + (ok ? 'ok' : 'err');
    setTimeout(() => { box.className = 'status'; box.innerHTML=''; }, 4000);
  }
</script>
</body>
</html>
