<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaskNova - Refer System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #000; min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }

  .content { padding: 16px 14px; }

  .header { text-align: center; margin-bottom: 16px; }
  .header h1 { font-size: 20px; font-weight: 800; color: #fff; }
  .header p { font-size: 11px; color: #555; margin-top: 2px; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 16px; }
  .stat-box { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 10px 6px; text-align: center; }
  .stat-value { font-size: 16px; font-weight: 800; color: #fff; }
  .stat-label { font-size: 9px; color: #444; margin-top: 2px; }

  /* Section Label */
  .section-label { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 8px; }

  /* Tier Cards */
  .tiers-section { margin-bottom: 16px; }

  .tier-card {
    background: #111;
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #1e1e1e;
  }

  .tier-info { flex: 1; min-width: 0; }
  .tier-name { font-size: 12px; font-weight: 700; color: #fff; }
  .tier-desc { font-size: 10px; color: #555; margin-top: 1px; }

  .tier-progress-bar { height: 3px; background: #1e1e1e; border-radius: 10px; overflow: hidden; margin-top: 6px; }
  .tier-progress-fill { height: 100%; background: #22c55e; border-radius: 10px; transition: width 0.6s ease; }
  .tier-progress-label { font-size: 9px; color: #444; margin-top: 3px; display: flex; justify-content: space-between; }

  .tier-badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 50px; margin-top: 4px; }
  .badge-achieved { background: #0a2a14; color: #22c55e; }
  .badge-next     { background: #0a2a14; color: #22c55e; }
  .badge-locked   { background: #1a1a1a; color: #444; }

  .tier-reward { text-align: right; flex-shrink: 0; }
  .tier-reward-amt { font-size: 16px; font-weight: 900; color: #22c55e; }
  .tier-reward-label { font-size: 9px; color: #444; margin-top: 1px; }

  /* Code Section */
  .code-section { margin-bottom: 16px; }
  .code-label { font-size: 11px; color: #555; margin-bottom: 7px; font-weight: 600; }
  .code-box { background: #111; border: 1.5px dashed #2a2a2a; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .code-text { font-size: 18px; font-weight: 800; color: #22c55e; letter-spacing: 3px; }
  .copy-btn { background: #22c55e; border: none; border-radius: 7px; padding: 7px 14px; color: #000; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Segoe UI', sans-serif; }
  .share-buttons { display: flex; gap: 7px; }
  .share-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .share-btn:active { opacity: 0.8; }
  .share-whatsapp { background: #0d2016; border: 1px solid #25d366; color: #25d366; }
  .share-general  { background: #22c55e; color: #000; }

  /* Refer List */
  .section-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .refer-item { background: #111; border: 1px solid #1a1a1a; border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .refer-left { display: flex; align-items: center; gap: 9px; }
  .refer-avatar { width: 32px; height: 32px; background: #1a1a2e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .refer-name { font-weight: 600; color: #fff; font-size: 12px; }
  .refer-date { font-size: 9px; color: #444; margin-top: 1px; }
  .status-pill { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 50px; }
  .status-done    { background: #0a2a14; color: #22c55e; }
  .status-pending { background: #2a1f00; color: #eab308; }

  .empty-state { text-align: center; padding: 24px; background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; }
  .empty-state h4 { font-size: 12px; font-weight: 600; color: #444; }
  .empty-state p  { font-size: 10px; color: #333; margin-top: 4px; }

  /* Toast */
  .toast { position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%); background: #0a2a14; border: 1px solid #22c55e; color: #22c55e; padding: 8px 20px; border-radius: 50px; font-size: 12px; font-weight: 600; z-index: 200; display: none; white-space: nowrap; }
  .toast.show { display: block; }

  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; padding: 8px 0 18px; z-index: 100; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 14px; }
  .nav-item span { font-size: 19px; }
  .nav-item p { font-size: 9px; color: #444; font-weight: 500; }
  .nav-item.active p { color: #22c55e; }
  .nav-center { width: 46px; height: 46px; background: #22c55e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; margin-top: -16px; cursor: pointer; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="content">

  <div class="header">
    <h1>Refer & Earn</h1>
    <p>Jitna refer, utna reward</p>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-value" id="totalReferrals">0</div>
      <div class="stat-label">Total Refers</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="completedReferrals">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="referEarned">₹0</div>
      <div class="stat-label">Earned</div>
    </div>
  </div>

  <div class="tiers-section">
    <div class="section-label">Reward Tiers</div>
    <div id="tierList"></div>
  </div>

  <div class="code-section">
    <div class="code-label">Your Referral Code</div>
    <div class="code-box">
      <div class="code-text" id="referralCode">TN000000</div>
      <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>
    <div class="share-buttons">
      <button class="share-btn share-whatsapp" onclick="shareWhatsApp()">WhatsApp</button>
      <button class="share-btn share-general" onclick="shareNow()">Share</button>
    </div>
  </div>

  <div class="section-title">Your Referrals</div>
  <div id="referList">
    <div class="empty-state">
      <h4>No referrals yet!</h4>
      <p>Share your code aur rewards kamao</p>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='tasknova_login-1.html'"><span>🏠</span><p>Home</p></div>
  <div class="nav-item" onclick="window.location.href='tasknova_tasks.html'"><span>📋</span><p>Tasks</p></div>
  <div class="nav-center" onclick="window.location.href='tasknova_withdraw.html'">💰</div>
  <div class="nav-item active"><span>👥</span><p>Refer</p></div>
  <div class="nav-item" onclick="window.location.href='tasknova_profile.html'"><span>👤</span><p>Profile</p></div>
</div>

<script>
  const TIERS = [
    { count: 1,  reward: 50,  name: '1 Refer'   },
    { count: 5,  reward: 250, name: '5 Refers'  },
    { count: 10, reward: 500, name: '10 Refers' },
  ];

  function renderTiers(done) {
    const nextIdx = TIERS.findIndex(t => done < t.count);
    document.getElementById('tierList').innerHTML = TIERS.map((t, i) => {
      const achieved = done >= t.count;
      const isNext   = i === nextIdx;
      const pct      = Math.min((done / t.count) * 100, 100).toFixed(0);
      const badge    = achieved
        ? `<span class="tier-badge badge-achieved">Achieved</span>`
        : isNext
        ? `<span class="tier-badge badge-next">Next Goal</span>`
        : `<span class="tier-badge badge-locked">Locked</span>`;

      return `
        <div class="tier-card">
          <div class="tier-info">
            <div class="tier-name">${t.name}</div>
            <div class="tier-desc">Complete karo aur ₹${t.reward} pao</div>
            <div class="tier-progress-bar"><div class="tier-progress-fill" style="width:${pct}%"></div></div>
            <div class="tier-progress-label"><span>${done}/${t.count} completed</span><span>${pct}%</span></div>
            ${badge}
          </div>
          <div class="tier-reward">
            <div class="tier-reward-amt">₹${t.reward}</div>
            <div class="tier-reward-label">REWARD</div>
          </div>
        </div>`;
    }).join('');
  }

  renderTiers(0);

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function getCode() { return document.getElementById('referralCode').textContent.trim(); }

  function copyCode() {
    navigator.clipboard.writeText(getCode()).then(() => showToast('Code Copied!')).catch(() => alert('Code: ' + getCode()));
  }

  function shareWhatsApp() {
    const code = getCode();
    const link = 'https://maheshgoswami09837-ship-it.github.io/Tasknova/tasknova_login-1.html?ref=' + code;
    const msg  = 'Join TaskNova!\n\nReferral code: *' + code + '*\n1 Refer=₹50 | 5=₹250 | 10=₹500\n\n' + link;
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  }

  function shareNow() {
    const code = getCode();
    const link = 'https://maheshgoswami09837-ship-it.github.io/Tasknova/tasknova_login-1.html?ref=' + code;
    if (navigator.share) navigator.share({ title: 'TaskNova', text: 'Code: ' + code, url: link }).catch(() => {});
    else navigator.clipboard.writeText(link).then(() => showToast('Link Copied!'));
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyBbDeBse2WXwzd_X0Mr8VyEzytI8Yya_uc",
    authDomain: "tasknova-66d0f.firebaseapp.com",
    databaseURL: "https://tasknova-66d0f-default-rtdb.firebaseio.com",
    projectId: "tasknova-66d0f",
    storageBucket: "tasknova-66d0f.firebasestorage.app",
    messagingSenderId: "135129024485",
    appId: "1:135129024485:web:232a90fd0752086568510c"
  });

  const dbURL = 'https://tasknova-66d0f-default-rtdb.firebaseio.com';

  onAuthStateChanged(getAuth(app), async (user) => {
    if (!user) return;
    const ap  = '?auth=' + await user.getIdToken(true);
    const uid = user.uid;

    const userData = await fetch(dbURL + '/users/' + uid + '.json' + ap).then(r => r.json());
    if (!userData) return;

    const code = userData.referralCode || ('TN' + uid.substring(0,6).toUpperCase());
    document.getElementById('referralCode').textContent = code;

    const refData = await fetch(dbURL + '/referrals/' + code + '.json' + ap).then(r => r.json());
    if (!refData) { renderTiers(0); return; }

    const items     = Object.entries(refData).reverse();
    const total     = items.length;
    const completed = items.filter(([k,v]) => v.withdrawn).length;

    document.getElementById('totalReferrals').textContent     = total;
    document.getElementById('completedReferrals').textContent = completed;
    document.getElementById('referEarned').textContent        = '₹' + (completed * 50);
    renderTiers(completed);

    document.getElementById('referList').innerHTML = items.map(([key, item]) => `
      <div class="refer-item">
        <div class="refer-left">
          <div class="refer-avatar">👤</div>
          <div>
            <div class="refer-name">${item.name || 'Friend'}</div>
            <div class="refer-date">${new Date(item.joined || item.date).toLocaleDateString()}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <span class="status-pill ${item.withdrawn ? 'status-done' : 'status-pending'}">
            ${item.withdrawn ? 'Completed' : 'Pending'}
          </span>
          ${item.withdrawn ? '<div style="font-size:9px;color:#22c55e;margin-top:2px;">+₹50</div>' : ''}
        </div>
      </div>`).join('');
  });
</script>
</body>
</html>
