<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Check-In</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; outline:none; }

  :root {
    --ink:#1a1530; --muted:#948da8; --brand:#6c3aff; --brand-deep:#4f46e5;
    --gold:#f5a623; --line:#eee7ff;
  }

  body {
    font-family:'Segoe UI',-apple-system,Roboto,sans-serif;
    background:linear-gradient(160deg,#f3effc 0%,#eaeeff 55%,#eef2ff 100%);
    min-height:100vh; padding:20px 16px 40px; color:var(--ink);
  }

  .back-btn { display:inline-flex; align-items:center; gap:6px; background:none; border:none; color:var(--brand); font-size:15px; font-weight:700; cursor:pointer; margin-bottom:18px; padding:0; }

  /* ── Streak flame hero ───────────────────────── */
  .flame-hero { display:flex; align-items:center; gap:14px; margin-bottom:18px; padding:16px 18px; border-radius:20px; background:linear-gradient(135deg,#2b1a55,#4f2bb3); box-shadow:0 10px 28px rgba(76,41,200,0.28); position:relative; overflow:hidden; }
  .flame-hero::after { content:''; position:absolute; inset:0; background:radial-gradient(circle at 85% 0%, rgba(255,255,255,0.16), transparent 55%); }
  .flame-icon { display:flex; align-items:center; justify-content:center; flex-shrink:0; filter:drop-shadow(0 0 10px rgba(245,158,11,0.6)); animation:starPulse 1.8s ease-in-out infinite; }
  @keyframes starPulse { 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.1);} }
  .flame-text { position:relative; z-index:1; }
  .flame-text .label { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:rgba(255,255,255,0.65); }
  .flame-text .value { font-size:23px; font-weight:900; color:#fff; line-height:1.2; }
  .flame-text .value span { font-size:18px; margin-left:2px; }

  .card { background:#fff; border-radius:26px; padding:22px 18px 30px; width:100%; box-shadow:0 14px 36px rgba(108,58,255,0.14), 0 2px 8px rgba(108,58,255,0.06); }

  .card-header { display:flex; align-items:center; gap:12px; margin-bottom:22px; padding-bottom:16px; border-bottom:1px solid var(--line); }
  .card-header .icon { width:44px; height:44px; background:linear-gradient(135deg,#ede9fe,#e0d4ff); border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .card-header h2 { font-size:19px; font-weight:800; color:var(--ink); letter-spacing:-0.01em; }
  .card-header .sub { font-size:12px; color:var(--muted); font-weight:600; margin-top:1px; }

  .streak-scroll { overflow-x:auto; overflow-y:visible; -webkit-overflow-scrolling:touch; touch-action:pan-x; padding:22px 4px 14px; scrollbar-width:none; }
  .streak-scroll::-webkit-scrollbar { display:none; }

  .streak-row { display:flex; align-items:flex-start; width:max-content; padding:8px 8px 4px; gap:0; position:relative; }

  .day-item { display:flex; flex-direction:column; align-items:center; gap:9px; position:relative; width:86px; }

  /* connecting line — dashed */
  .day-item:not(:last-child)::after { content:''; position:absolute; top:35px; left:calc(50% + 25px); width:calc(86px - 50px); height:3px; background-image:linear-gradient(90deg, var(--brand) 50%, transparent 50%); background-size:8px 3px; z-index:0; border-radius:3px; }
  .day-item.future:not(:last-child)::after { background-image:linear-gradient(90deg, #ddd 50%, transparent 50%); background-size:8px 3px; }

  /* coin circle */
  .coin-wrap { width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; flex-shrink:0; transition:all 0.3s; }

  .coin-wrap.claimed  { background:linear-gradient(135deg,#f3effc,#eee7ff); border:2.5px solid var(--brand); box-shadow:0 3px 9px rgba(108,58,255,0.13); }
  .coin-wrap.active   { background:linear-gradient(135deg,#fff8e1,#ffefc4); border:3px solid var(--brand); box-shadow:0 0 0 5px rgba(108,58,255,0.13), 0 6px 16px rgba(245,166,35,0.25); width:64px; height:64px; }
  .coin-wrap.future   { background:#f6f5fa; border:2.5px dashed #ddd6ec; box-shadow:inset 0 1px 4px rgba(108,58,255,0.05); }

  /* milestone (day 7 / 14) — star ring */
  .coin-wrap.milestone:not(.future) { box-shadow:0 0 0 4px rgba(245,166,35,0.2); }
  .coin-wrap.milestone::before { content:'★'; position:absolute; top:-8px; right:-5px; font-size:12px; color:#fff; background:linear-gradient(135deg,var(--gold),#e0840f); width:19px; height:19px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(229,145,15,0.5); z-index:2; }

  /* pointer */
  .pointer { position:absolute; top:-17px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-top:11px solid var(--brand); }

  .coin-wrap.claimed .coin-emoji { font-size:26px; opacity:0.5; filter:grayscale(0.5); }
  .coin-wrap.active  .coin-emoji { font-size:32px; filter:drop-shadow(0 2px 6px rgba(245,166,35,0.7)); }
  .coin-wrap.future  .coin-emoji { font-size:24px; opacity:0.35; filter:grayscale(1); }

  @keyframes coinPop { 0%{transform:translateY(0) scale(0);opacity:0} 50%{transform:translateY(-28px) scale(1.3);opacity:1} 100%{transform:translateY(-48px) scale(1);opacity:0} }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 5px rgba(108,58,255,0.13), 0 6px 16px rgba(245,166,35,0.25)} 50%{box-shadow:0 0 0 9px rgba(108,58,255,0.24), 0 6px 20px rgba(245,166,35,0.4)} }
  .coin-wrap.active { animation:pulse 1.8s ease-in-out infinite; }
  .coin-pop { position:absolute; top:0; left:50%; transform:translateX(-50%); font-size:18px; animation:coinPop 0.8s ease forwards; pointer-events:none; z-index:10; }

  .day-label { font-size:11px; font-weight:700; color:#b4adc9; white-space:nowrap; }
  .day-label.active  { color:var(--brand); font-weight:800; }
  .day-label.claimed { color:#998fb8; }

  .reward-badge { display:inline-flex; align-items:center; gap:3px; background:#f5f5ff; border-radius:8px; padding:4px 9px; font-size:12px; font-weight:700; color:#998fb8; }
  .reward-badge.active  { background:#ede9fe; color:var(--brand); }
  .reward-badge.claimed { background:#f1eefb; color:#a89dc4; }

  .streak-info { text-align:center; margin:22px 0 6px; font-size:13.5px; color:var(--muted); font-weight:600; line-height:1.5; }
  .streak-info strong { color:var(--brand); }

  .claim-btn { width:64%; margin:18px auto 0; padding:15px; background:linear-gradient(135deg,var(--brand),var(--brand-deep)); border:none; border-radius:50px; color:#fff; font-size:15px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 8px 22px rgba(108,58,255,0.4); transition:transform 0.15s; }
  .claim-btn:active { transform:scale(0.96); }
  .claim-btn:disabled { background:#ddd9e6; box-shadow:none; cursor:not-allowed; animation:none; color:#a39ab8; }

  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,var(--brand),var(--brand-deep)); color:#fff; padding:12px 28px; border-radius:50px; font-size:15px; font-weight:700; z-index:9999; opacity:0; transition:opacity 0.3s; white-space:nowrap; box-shadow:0 4px 20px rgba(108,58,255,0.4); pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<button class="back-btn" onclick="history.back()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6c3aff" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  Back
</button>

<div class="flame-hero">
  <div class="flame-icon">
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" fill="url(#starGrad)"/>
      <defs>
        <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
      </defs>
      <path d="M12 6l1.5 3.5L17 10l-2.5 2.5.5 3.5L12 14.5 9 16l.5-3.5L7 10l3.5-.5L12 6z" fill="#fff" opacity="0.95"/>
    </svg>
  </div>
  <div class="flame-text">
    <div class="label">Current Streak</div>
    <div class="value" id="flameStreak">Loading<span></span></div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <div class="icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="4" width="20" height="18" rx="3" fill="#ede9fe" stroke="#6c3aff" stroke-width="1.5"/>
        <rect x="2" y="4" width="20" height="6" rx="3" fill="#6c3aff"/>
        <rect x="8" y="0" width="2" height="6" rx="1" fill="#6c3aff"/>
        <rect x="14" y="0" width="2" height="6" rx="1" fill="#6c3aff"/>
        <rect x="6" y="13" width="3" height="3" rx="0.5" fill="#6c3aff" opacity="0.5"/>
        <rect x="10.5" y="13" width="3" height="3" rx="0.5" fill="#6c3aff" opacity="0.5"/>
        <rect x="15" y="13" width="3" height="3" rx="0.5" fill="#6c3aff" opacity="0.5"/>
      </svg>
    </div>
    <div>
      <h2>Daily Check-In</h2>
      <div class="sub">Roz check-in karo aur coins kamao!</div>
    </div>
  </div>

  <div class="streak-scroll">
    <div class="streak-row" id="streakRow">
      <div class="day-item future" style="opacity:0.5;">
        <div class="coin-wrap future"><span class="coin-emoji">🪙</span></div>
        <div class="day-label">...</div>
        <div class="reward-badge">🪙 --</div>
      </div>
    </div>
  </div>

  <div class="streak-info" id="streakInfo">Loading...</div>
  <button class="claim-btn" id="claimBtn" onclick="claimToday()" disabled>Loading...</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBbDeBse2WXwzd_X0Mr8VyEzytI8Yya_uc",
    authDomain: "tasknova-66d0f.firebaseapp.com",
    databaseURL: "https://tasknova-66d0f-default-rtdb.firebaseio.com",
    projectId: "tasknova-66d0f",
    storageBucket: "tasknova-66d0f.firebasestorage.app",
    messagingSenderId: "135129024485",
    appId: "1:135129024485:web:232a90fd0752086568510c"
  };
  const _app  = initializeApp(firebaseConfig);
  const _auth = getAuth(_app);

  window._getAuthToken = async function() {
    return new Promise((resolve) => {
      const unsub = onAuthStateChanged(_auth, async (user) => {
        unsub();
        if (user) {
          const token = await user.getIdToken(true);
          resolve(token);
        } else {
          resolve(null);
        }
      });
    });
  };
</script>

<script>
  const REWARDS = [2,1,1,2,1,1,5, 1,1,2,1,1,2,5, 1,1,2,1,1,2,5, 1,1,2,1,1,2,5, 1,10];
  const DB_URL  = 'https://tasknova-66d0f-default-rtdb.firebaseio.com';

  // ── IST date helper (matches tasks page) ───────────────────────
  function getTodayIST() {
    const now = new Date(Date.now() + 5.5*60*60*1000);
    return now.toISOString().split('T')[0]; // YYYY-MM-DD
  }
  function getYesterdayIST() {
    const now = new Date(Date.now() + 5.5*60*60*1000 - 86400000);
    return now.toISOString().split('T')[0];
  }

  let currentStreak  = 0;
  let currentClaimed = false;
  let uid = null;

  function render() {
    const streak  = currentStreak;
    const claimed = currentClaimed;
    const activeDay = claimed ? streak - 1 : streak;
    const row = document.getElementById('streakRow');
    row.innerHTML = '';

    const flameEl = document.getElementById('flameStreak');
    if (flameEl) {
      flameEl.innerHTML = streak > 0 ? `Day ${streak}` : `Shuru karo<span>!</span>`;
    }

    for (let i = 0; i < 30; i++) {
      const isClaimed   = i < streak;
      const isActive    = i === activeDay;
      const isFuture    = !isClaimed && !isActive;
      const isMilestone = ((i + 1) % 7 === 0) || (i + 1 === 30);
      const coins       = REWARDS[i];

      const wrapCls  = 'coin-wrap ' + (isClaimed ? 'claimed' : isActive ? 'active' : 'future') + (isMilestone ? ' milestone' : '');
      const labelCls = 'day-label ' + (isClaimed ? 'claimed' : isActive ? 'active' : '');
      const badgeCls = 'reward-badge ' + (isClaimed ? 'claimed' : isActive ? 'active' : '');
      const itemCls  = 'day-item' + (isFuture ? ' future' : '');
      const pointer  = isActive ? '<div class="pointer"></div>' : '';
      const emoji    = isMilestone ? '🎁' : '🪙';

      row.innerHTML += `
        <div class="${itemCls}" id="dayItem${i}">
          <div class="${wrapCls}" id="coinWrap${i}">
            ${pointer}
            <span class="coin-emoji">${emoji}</span>
          </div>
          <div class="${labelCls}">${i+1} Day</div>
          <div class="${badgeCls}">🪙 ${coins}</div>
        </div>`;
    }

    setTimeout(() => {
      const active = document.querySelector('.coin-wrap.active');
      if (active) active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    }, 100);

    updateUI(streak, claimed);
  }

  function updateUI(streak, claimed) {
    const info = document.getElementById('streakInfo');
    const btn  = document.getElementById('claimBtn');
    if (claimed) {
      const isBonus = (streak % 7 === 0 || streak === 30);
      info.innerHTML = isBonus
        ? `🎉 Streak: <strong>Day ${streak}</strong> Complete! Bonus <strong>+${REWARDS[streak-1]} Coins</strong> milgaye!`
        : `Aaj ka check-in ho chuka! Streak: <strong>Day ${streak}</strong>`;
      btn.disabled = true;
      btn.textContent = 'Already Claimed';
    } else {
      const coins = REWARDS[Math.min(streak, 29)];
      info.innerHTML = `Aaj claim karo: <strong>+${coins} Coins</strong> | Streak: <strong>Day ${streak+1}</strong>`;
      btn.disabled = false;
      btn.textContent = `Claim +${coins} Coins`;
    }
  }

  // ── Load current state from Firebase ────────────────────────────
  async function loadState() {
    uid = localStorage.getItem('tasknova_uid');
    if (!uid || uid === 'null') {
      // Not logged in — fallback to a disabled state
      currentStreak = 0;
      currentClaimed = false;
      render();
      const btn = document.getElementById('claimBtn');
      btn.disabled = true;
      btn.textContent = 'Login required';
      return;
    }

    const getToken1 = await waitForAuthToken();
    const token = await getToken1();
    const authParam = token ? '?auth=' + token : '';

    try {
      const res  = await fetch(DB_URL + '/users/' + uid + '.json' + authParam);
      const data = await res.json() || {};

      const todayKey     = getTodayIST();
      const yesterdayKey = getYesterdayIST();
      let streak   = data.checkinStreak || 0;
      const lastDate = data.checkinLastDate || '';

      // Streak reset nahi hoga — miss karo to wahan se continue karo jahan chhoda tha

      const claimedToday = (data.dailyTasks && data.dailyTasks[todayKey] && data.dailyTasks[todayKey].checkin) || (lastDate === todayKey);

      _lastDateFromDB = lastDate;
      currentStreak  = streak;
      currentClaimed = !!claimedToday;
      render();
    } catch (e) {
      console.log(e);
      render();
    }
  }

  async function claimToday() {
    if (currentClaimed) return;
    if (!uid || uid === 'null') return;

    const btn = document.getElementById('claimBtn');
    btn.disabled = true;
    btn.textContent = 'Claiming...';

    const todayKey     = getTodayIST();
    const yesterdayKey = getYesterdayIST();

    let streak = currentStreak;
    // Miss karo ya consecutive — dono mein sirf increment, reset nahi
    // 14 ke baad wapas Day 1 se shuru
    streak = streak >= 30 ? 1 : streak + 1;

    const coins    = REWARDS[streak-1];
    const dayIndex = streak-1;

    const wrap = document.getElementById('coinWrap'+dayIndex);
    if (wrap) {
      const pop = document.createElement('span');
      pop.className = 'coin-pop';
      pop.textContent = ((dayIndex + 1) % 7 === 0) ? '🎁' : '🪙';
      wrap.appendChild(pop);
      setTimeout(() => pop.remove(), 800);
    }

    try {
      const getToken2 = await waitForAuthToken();
      const token = await getToken2();
      const authParam = token ? '?auth=' + token : '';

      // Read fresh data to avoid race conditions
      const res  = await fetch(DB_URL + '/users/' + uid + '.json' + authParam);
      const data = await res.json() || {};

      // Double-check not already claimed today (server-side guard)
      const alreadyClaimed = (data.dailyTasks && data.dailyTasks[todayKey] && data.dailyTasks[todayKey].checkin) || (data.checkinLastDate === todayKey);
      if (alreadyClaimed) {
        currentClaimed = true;
        currentStreak  = data.checkinStreak || streak;
        render();
        return;
      }

      const newCoins   = (data.coins || 0) + coins;
      const newBalance = parseFloat((newCoins / 1).toFixed(2));

      const patch = {
        coins: newCoins,
        balance: newBalance,
        totalEarned: newBalance,
        checkinStreak: streak,
        checkinLastDate: todayKey
      };
      patch['dailyTasks/' + todayKey + '/checkin'] = true;

      await fetch(DB_URL + '/users/' + uid + '.json' + authParam, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(patch)
      });

      // Update top-level balance display if present
      const balEl  = document.getElementById('balanceDisplay');
      const coinEl = document.getElementById('coinsDisplay');
      if (balEl)  balEl.innerHTML   = '₹' + newBalance.toFixed(2);
      if (coinEl) coinEl.textContent = newCoins.toLocaleString('en-IN') + ' Coins';

      currentStreak  = streak;
      currentClaimed = true;

      setTimeout(() => {
        showToast(`+${coins} Coins! Day ${streak} Complete`);
        render();
      }, 500);
    } catch (e) {
      console.log(e);
      btn.disabled = false;
      btn.textContent = `Claim +${coins} Coins`;
      showToast('Kuch error hua, dobara try karo');
    }
  }

  // helper: was last claim yesterday (IST)?
  let _lastDateFromDB = '';
  function currentLastDateMatches(yesterdayKey) {
    return _lastDateFromDB === yesterdayKey;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Wait until the module script defines window._getAuthToken
  function waitForAuthToken() {
    return new Promise((resolve) => {
      let waited = 0;
      const interval = setInterval(() => {
        if (window._getAuthToken || waited > 1500) {
          clearInterval(interval);
          resolve(window._getAuthToken || (async () => null));
        }
        waited += 50;
      }, 50);
    });
  }

  // Initial load
  (function init() {
    loadState();
  })();
</script>
</body>
</html>
